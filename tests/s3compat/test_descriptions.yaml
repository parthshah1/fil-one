test_get_object_ifmatch_good: GetObject with If-Match=<correct-etag> succeeds.
test_get_object_ifmatch_failed: GetObject with If-Match=<wrong-etag> expects 412 PreconditionFailed.
test_get_object_ifnonematch_good: GetObject with If-None-Match=<wrong-etag> succeeds.
