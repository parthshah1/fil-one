test_object_acl_readacp: PutObjectAcl grant READ_ACP to alt user; alt user can GetObjectAcl but not the content.
test_bucket_acl_grant_userid_fullcontrol: PutBucketAcl FULL_CONTROL to alt user's ID; alt user has full bucket access.
test_bucket_acl_grant_userid_read: PutBucketAcl READ to alt user's ID; alt user can ListObjects.
test_bucket_acl_grant_userid_readacp: PutBucketAcl READ_ACP to alt user's ID; alt user can GetBucketAcl.
test_bucket_acl_grant_userid_write: PutBucketAcl WRITE to alt user's ID; alt user can PutObject into the bucket.
test_bucket_acl_grant_userid_writeacp: PutBucketAcl WRITE_ACP to alt user's ID; alt user can change the bucket ACL.
test_bucket_acl_grant_nonexist_user: PutBucketAcl referencing a non-existent CanonicalUser ID expects an error.
test_object_header_acl_grants: PutObject while injecting x-amz-grant-* headers; GetObjectAcl returns the five matching grants.
test_bucket_acl_grant_email: PutBucketAcl with email-address grantee resolves to the user's canonical ID.
test_bucket_acl_grant_email_not_exist: PutBucketAcl with an unknown email expects an error.
test_bucket_acl_revoke_all: PutBucketAcl with no grants is rejected (the owner FULL_CONTROL grant cannot be revoked).

# ── access combinations (v1 listing) ──

test_access_bucket_private_object_private: Both private; alt user cannot GET either object, ListObjects, or PUT.
test_access_bucket_private_object_publicread: Bucket private, object public-read; alt user can GET that one object only.
test_access_bucket_private_object_publicreadwrite: Bucket private, object public-read-write; alt user can still only GET that object.
test_access_bucket_publicread_object_private: Bucket public-read, object private; alt user can ListObjects but cannot GET the private object.
test_access_bucket_publicread_object_publicread: Both public-read; alt user can ListObjects and GET; cannot PUT.
test_access_bucket_publicread_object_publicreadwrite: Bucket public-read, object public-read-write; alt user can GET; cannot ListObjects-Write.
test_access_bucket_publicreadwrite_object_private: Bucket public-read-write, object private; alt user can ListObjects and PUT; GET on the private object fails.
test_access_bucket_publicreadwrite_object_publicread: Bucket public-read-write, object public-read; alt user has full operational access.
test_access_bucket_publicreadwrite_object_publicreadwrite: Both public-read-write; alt user has full operational access.

# ── multipart upload ──

test_multipart_upload_empty: Multipart upload with zero parts; CompleteMultipartUpload expects 400.
test_multipart_upload_complete_without_create: CompleteMultipartUpload with an invented UploadId expects 404 NoSuchUpload.
test_multipart_upload_small: Single-part multipart upload at the minimum sub-5MB size on the last part; completes successfully.
test_multipart_upload: Standard multipart upload with multiple 5MB parts; verifies CompleteMultipartUpload returns the composite ETag and GetObject returns the assembled body.
test_multipart_upload_resend_part: Re-uploading a part with the same PartNumber replaces it; CompleteMultipartUpload uses the latest part.
test_multipart_upload_multiple_sizes: Multipart upload at various sizes around the 5 MB part boundary; each completes intact.
test_multipart_upload_size_too_small: CompleteMultipartUpload where a non-last part is below 5 MB expects EntityTooSmall.
test_multipart_upload_contents: Multipart upload verifies the assembled bytes match the input.
test_multipart_upload_overwrite_existing_object: Multipart upload to a key that already exists replaces it.
test_abort_multipart_upload: AbortMultipartUpload releases the upload; subsequent CompleteMultipartUpload expects 404.
test_abort_multipart_upload_not_found: AbortMultipartUpload with an invented UploadId expects 404 NoSuchUpload.
test_list_multipart_upload: ListMultipartUploads returns ongoing uploads with key, UploadId, and Initiator.
test_list_multipart_upload_owner: ListMultipartUploads returns the Owner who initiated each upload.
test_multipart_upload_missing_part: CompleteMultipartUpload with a missing part in the parts list expects InvalidPart.
test_multipart_upload_incorrect_etag: CompleteMultipartUpload with a wrong ETag for a part expects InvalidPart.
test_multipart_get_part: GetObject with PartNumber on a multipart object returns just that part's bytes and PartsCount.
test_multipart_single_get_part: Same as test_multipart_get_part for a single-part multipart object.
test_non_multipart_get_part: GetObject with PartNumber=1 on a single-part (non-multipart) object returns the whole body.
test_100_continue: PutObject sends Expect:100-continue; server returns 100 before body is sent.
test_100_continue_error_retry: 100-continue with a server-side rejection (e.g. preauth failure) and the client must not send the body.

# ── CORS ──

test_set_cors: PutBucketCors round-trips a CORS rule via Put/Get/DeleteBucketCors.
test_cors_origin_response: OPTIONS preflight with an allowed Origin returns the configured Access-Control-Allow-Origin.
test_cors_origin_wildcard: OPTIONS preflight with a wildcard `*` origin rule returns the wildcard.
test_cors_header_option: CORS rule with AllowedHeaders; preflight returns Access-Control-Allow-Headers.
test_cors_presigned_get_object: CORS preflight then presigned GET succeeds for the allowed origin.
test_cors_presigned_get_object_tenant: Tenant-scoped variant.
test_cors_presigned_get_object_v2: SigV2 variant.
test_cors_presigned_get_object_tenant_v2: Tenant + SigV2 variant.
test_cors_presigned_put_object: CORS preflight then presigned PUT succeeds.
test_cors_presigned_put_object_with_acl: Same with x-amz-acl in the presigned URL.
test_cors_presigned_put_object_v2: SigV2 variant.
test_cors_presigned_put_object_tenant_v2: Tenant + SigV2 variant.
test_cors_presigned_put_object_tenant: Tenant variant.
test_cors_presigned_put_object_tenant_with_acl: Tenant + ACL variant.

# ── atomic read/write (concurrent PUT/GET) ──

test_atomic_read_1mb: GET during an in-flight overwrite returns either the old or new full body — never a mix. Tested at 1 MB.
test_atomic_read_4mb: Same atomicity check at 4 MB.
test_atomic_read_8mb: Same at 8 MB.
test_atomic_write_1mb: Concurrent overlapping PUTs of the same key resolve to one consistent final body (no torn writes). At 1 MB.
test_atomic_write_4mb: Same at 4 MB.
test_atomic_write_8mb: Same at 8 MB.
test_atomic_dual_write_1mb: Two-writer atomicity check at 1 MB.
test_atomic_dual_write_4mb: At 4 MB.
test_atomic_dual_write_8mb: At 8 MB.
test_atomic_conditional_write_1mb: Conditional PUT (IfNoneMatch) atomicity check at 1 MB; only one writer wins.
test_atomic_dual_conditional_write_1mb: Two conditional PUTs at 1 MB; at most one succeeds.
test_atomic_write_bucket_gone: PUT during concurrent DeleteBucket; PUT either succeeds or returns 404 — no intermediate state.
test_atomic_multipart_upload_write: Concurrent multipart upload + single-PUT to the same key resolve consistently.
test_multipart_resend_first_finishes_last: Resending PartNumber=1 after later parts completed must replace the first part; final body uses the resent bytes.

# ── ranged GET ──

test_ranged_request_response_code: GET with Range header returns 206 Partial Content.
test_ranged_big_request_response_code: Range on a large object returns 206 with correct Content-Range and Content-Length.
test_ranged_request_skip_leading_bytes_response_code: Range=bytes=N- returns the suffix.
test_ranged_request_return_trailing_bytes_response_code: Range=bytes=-N returns the trailing N bytes.
test_ranged_request_invalid_range: Range beyond object size expects 416 InvalidRange.
test_ranged_request_empty_object: Range on a 0-byte object expects 416 or appropriate empty handling.
test_object_read_unreadable: GetObject of a key whose name contains unreadable bytes; client must round-trip the URL-encoded name.

# ── bucket policy status + public access block ──

test_get_bucket_policy_status: GetBucketPolicyStatus on a bucket with no policy returns IsPublic=False.
test_get_public_acl_bucket_policy_status: GetBucketPolicyStatus reflects a public ACL as IsPublic=True.
test_get_authpublic_acl_bucket_policy_status: GetBucketPolicyStatus with authenticated-read ACL returns IsPublic=True (AuthenticatedUsers is considered public).
test_get_publicpolicy_acl_bucket_policy_status: GetBucketPolicyStatus with a wildcard-principal Allow policy returns IsPublic=True.
test_get_nonpublicpolicy_acl_bucket_policy_status: Policy whose principals are scoped to specific ARNs returns IsPublic=False.
test_get_nonpublicpolicy_principal_bucket_policy_status: NotPrincipal patterns are correctly classified non-public.
test_bucket_policy_allow_notprincipal: Bucket policy with NotPrincipal works as documented (allow all except those listed).
test_get_undefined_public_block: GetPublicAccessBlock on a bucket without configuration expects NoSuchPublicAccessBlockConfiguration.
test_get_public_block_deny_bucket_policy: PutPublicAccessBlock with RestrictPublicBuckets blocks subsequent public bucket policies.
test_put_public_block: PutPublicAccessBlock round-trips all four flags via Put/Get.
test_block_public_put_bucket_acls: With BlockPublicAcls=true, PutBucketAcl public-read is rejected.
test_block_public_object_canned_acls: With BlockPublicAcls=true, PutObject ACL=public-read is rejected.
test_block_public_policy: With BlockPublicPolicy=true, PutBucketPolicy with a wildcard principal is rejected.
test_block_public_policy_with_principal: BlockPublicPolicy does not block policies that specify a non-wildcard principal.
test_block_public_restrict_public_buckets: With RestrictPublicBuckets=true, anonymous list/get on a public bucket is denied even if its ACL is public.
test_ignore_public_acls: With IgnorePublicAcls=true, existing public-read ACLs are ignored at access-check time.
test_put_get_delete_public_block: PutPublicAccessBlock + GetPublicAccessBlock + DeletePublicAccessBlock round-trip.
test_multipart_upload_on_a_bucket_with_policy: Multipart upload to a bucket with a Deny policy on PutObject succeeds when the policy permits the upload's principal.

# ── misc — torrent, object attributes, percent-encoded keys, ownership controls, 404 ──

test_get_object_torrent: GetObjectTorrent on an object; expects either a torrent file or NotImplemented depending on provider.
test_get_multipart_object_attributes: GetObjectAttributes on a multipart object returns ObjectParts and per-part sizes.
test_get_paginated_multipart_object_attributes: GetObjectAttributes with MaxParts paginates through ObjectParts.
test_get_single_multipart_object_attributes: GetObjectAttributes on a one-part multipart object returns one ObjectPart.
test_get_checksum_object_attributes: GetObjectAttributes returns the Checksum field for objects uploaded with a checksum algorithm.
test_get_versioned_object_attributes: GetObjectAttributes with VersionId returns that version's ObjectSize and ETag.
test_get_object_attributes: GetObjectAttributes basic round-trip returns ETag, ObjectSize, and StorageClass.
test_upload_part_copy_percent_encoded_key: UploadPartCopy where the source key contains characters that must be percent-encoded; copy succeeds.
test_create_bucket_no_ownership_controls: CreateBucket without ObjectOwnership leaves the bucket with the default (ObjectWriter on AWS, varies per provider).
test_create_bucket_bucket_owner_enforced: CreateBucket with ObjectOwnership=BucketOwnerEnforced disables ACLs entirely.
test_create_bucket_bucket_owner_preferred: CreateBucket with BucketOwnerPreferred causes new objects to be owned by the bucket owner when uploaded with bucket-owner-full-control.
test_create_bucket_object_writer: CreateBucket with ObjectOwnership=ObjectWriter; uploader retains ownership.
test_put_bucket_ownership_bucket_owner_enforced: PutBucketOwnershipControls flipping a bucket to BucketOwnerEnforced disables ACLs.
test_put_bucket_ownership_bucket_owner_preferred: PutBucketOwnershipControls to BucketOwnerPreferred.
test_put_bucket_ownership_object_writer: PutBucketOwnershipControls to ObjectWriter.
test_head_object_404_with_policy_prefix: HeadObject on a missing key under a policy-restricted prefix; expects 404 (not 403 — the policy doesn't leak existence).
