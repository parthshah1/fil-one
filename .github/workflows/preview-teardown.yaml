name: Preview Teardown

on:
  pull_request:
    types: [closed]

jobs:
  teardown:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-2
      SST_STAGE: pr-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::654654381893:role/filone-infra-staging-github
          aws-region: us-east-2

      - name: Check if SST stage exists
        id: check-stage
        run: |
          exists=$(bin/check-sst-stage-exists.sh "$SST_STAGE") || exit $?
          echo "Stage ${SST_STAGE} exists=${exists}"
          echo "exists=${exists}" >> "$GITHUB_OUTPUT"

      - name: Remove SST stage
        id: remove
        if: steps.check-stage.outputs.exists == 'true'
        continue-on-error: true
        run: pnpm exec sst remove --stage "$SST_STAGE"

      - name: Determine failure phase
        if: >-
          always() && (
            steps.check-stage.outcome == 'failure' ||
            steps.remove.outcome == 'failure'
          )
        id: failure-phase
        run: |
          if [ "${{ steps.check-stage.outcome }}" = "failure" ]; then
            echo "phase=stage-existence check" >> "$GITHUB_OUTPUT"
            echo "detail=Could not determine whether the stage exists — AWS credentials, state backend, or transient error. Teardown was NOT attempted; resources for \`${SST_STAGE}\` may still be live." >> "$GITHUB_OUTPUT"
          else
            echo "phase=sst remove" >> "$GITHUB_OUTPUT"
            echo "detail=Stage \`${SST_STAGE}\` may have orphaned resources that need manual cleanup." >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack on teardown failure
        if: >-
          always() && (
            steps.check-stage.outcome == 'failure' ||
            steps.remove.outcome == 'failure'
          )
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "filone-alerts",
              "text": ${{ toJSON(format('Preview teardown failed ({4}) for PR #{0}. Details: {1}/{2}/actions/runs/{3}', github.event.pull_request.number, github.server_url, github.repository, github.run_id, steps.failure-phase.outputs.phase)) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format(':warning: *Preview teardown failed ({4}) for PR <{1}/{2}/pull/{0}|#{0}>* · <{1}/{2}/actions/runs/{3}|Details>', github.event.pull_request.number, github.server_url, github.repository, github.run_id, steps.failure-phase.outputs.phase)) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(steps.failure-phase.outputs.detail) }}
                  }
                }
              ]
            }

  dispatch-telemetry:
    needs: [teardown]
    if: >-
      always() &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch telemetry event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type=workflow-telemetry \
            -f "client_payload[run_id]=${{ github.run_id }}"
