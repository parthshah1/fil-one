name: Preview Teardown

on:
  pull_request:
    types: [closed]

jobs:
  teardown:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-2

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6
        with:
          role-to-assume: arn:aws:iam::654654381893:role/filone-infra-staging-github
          aws-region: us-east-2

      - name: Check if SST stage exists
        id: check-stage
        run: |
          STAGE="pr-${{ github.event.pull_request.number }}"
          if pnpm exec sst state list | grep -qw "$STAGE"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Stage ${STAGE} not found, nothing to tear down"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove SST stage
        id: remove
        if: steps.check-stage.outputs.exists == 'true'
        continue-on-error: true
        run: pnpm exec sst remove --stage "pr-${{ github.event.pull_request.number }}"

      - name: Notify Slack on teardown failure
        if: steps.remove.outcome == 'failure'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "filone-alerts",
              "text": ${{ toJSON(format('Preview teardown failed for PR #{0}. Details: {1}/{2}/actions/runs/{3}', github.event.pull_request.number, github.server_url, github.repository, github.run_id)) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format(':warning: *Preview teardown failed for PR <{1}/{2}/pull/{0}|#{0}>* · <{1}/{2}/actions/runs/{3}|Details>', github.event.pull_request.number, github.server_url, github.repository, github.run_id)) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('Stage `pr-{0}` may have orphaned resources that need manual cleanup.', github.event.pull_request.number)) }}
                  }
                }
              ]
            }

  dispatch-telemetry:
    needs: [teardown]
    if: >-
      always() &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch telemetry event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type=workflow-telemetry \
            -f "client_payload[run_id]=${{ github.run_id }}"
