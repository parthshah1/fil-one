name: 'E2E Tests [staging]'

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override BASE_URL (defaults to staging URL)'
        required: false
        type: string

concurrency:
  group: e2e-staging
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    permissions:
      id-token: write
      actions: write
      contents: read
    env:
      SST_STAGE: staging
      AWS_REGION: us-east-2
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_url || 'https://staging.fil.one' }}
      E2E_PAID_EMAIL: ${{ secrets.E2E_PAID_EMAIL }}
      E2E_PAID_PASSWORD: ${{ secrets.E2E_PAID_PASSWORD }}
      E2E_PAID_USER_ID: ${{ secrets.E2E_PAID_USER_ID }}
      E2E_UNPAID_EMAIL: ${{ secrets.E2E_UNPAID_EMAIL }}
      E2E_UNPAID_PASSWORD: ${{ secrets.E2E_UNPAID_PASSWORD }}
      E2E_UNPAID_USER_ID: ${{ secrets.E2E_UNPAID_USER_ID }}
      E2E_TRIAL_EMAIL: ${{ secrets.E2E_TRIAL_EMAIL }}
      E2E_TRIAL_PASSWORD: ${{ secrets.E2E_TRIAL_PASSWORD }}
      E2E_TRIAL_USER_ID: ${{ secrets.E2E_TRIAL_USER_ID }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      # Pin the first pnpm/action-setup commit that declares a Node 24 runtime.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      # auth.setup.ts re-seeds BillingTable rows for the test users via direct
      # DynamoDB writes (see tests/e2e/billing-reset.ts). The test:e2e script
      # wraps Playwright in `sst shell` so SST Resource bindings (BillingTable
      # name, etc.) resolve to the staging stage.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-staging-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "filone-alerts",
              "text": "E2E test run failed (${{ env.BASE_URL }}). Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *E2E test run failed* · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Details>"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployment tested: `${{ env.BASE_URL }}`"
                  }
                }
              ]
            }

  dispatch-telemetry:
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch telemetry event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type=workflow-telemetry \
            -f "client_payload[run_id]=${{ github.run_id }}"
