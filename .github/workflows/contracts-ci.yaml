name: 'CI [contracts]'

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-contracts:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      - name: Forge version
        run: |
          forge --version

      - name: Format
        run: |
          forge fmt --check
        id: fmt

      - name: Build
        run: |
          forge build --sizes
        id: build

      - name: Test
        run: |
          forge test -vvv
        id: test
      # ── Slither Static Analysis ──
      - name: Run Slither
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        with:
          slither-config: slither.config.json
          slither-args: --filter-paths "contracts/lib"
          sarif: slither-results.sarif
          solc-version: '0.8.13'
        continue-on-error: true # Advisory mode

      - name: Upload Slither results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: slither-results
          path: slither-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && vars.ENABLE_GHAS == 'true' && hashFiles('slither-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: slither-results.sarif
          category: slither

  dispatch-telemetry:
    needs: [check-contracts]
    if: >-
      always() && (
        github.event_name == 'push' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch telemetry event
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type=workflow-telemetry \
            -f "client_payload[run_id]=${{ github.run_id }}"
