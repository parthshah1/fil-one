name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly scan: Sunday 2am UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Semgrep SAST (custom rules blocking + community advisory)
  # ──────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.93.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep (custom rules — advisory)
        run: |
          semgrep scan \
            --config .semgrep.yml \
            --sarif --output semgrep-custom.sarif \
            --error \
            --verbose
        continue-on-error: true # Advisory mode — flip to false to block PRs

      - name: Run Semgrep (community rules — advisory)
        if: always()
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/jwt \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/security-audit \
            --metrics=off \
            --sarif --output semgrep-community.sarif \
            --verbose
        continue-on-error: true # Advisory — community rules may be noisy

      - name: Upload custom-rule results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-custom-results
          path: semgrep-custom.sarif

      - name: Upload community-rule results
        if: always() && hashFiles('semgrep-community.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-community-results
          path: semgrep-community.sarif

      - name: Upload custom SARIF to GitHub Security tab
        if: always() && vars.ENABLE_GHAS == 'true' && hashFiles('semgrep-custom.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom

      - name: Upload community SARIF to GitHub Security tab
        if: always() && vars.ENABLE_GHAS == 'true' && hashFiles('semgrep-community.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep-community.sarif
          category: semgrep-community

  # ──────────────────────────────────────────────────
  # Job 2: CodeQL (conditional — requires GHAS)
  # ──────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # Only run if GHAS is available (secret acts as feature flag)
    if: vars.ENABLE_CODEQL == 'true'
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}

  # ──────────────────────────────────────────────────
  # Job 3: Dependency Vulnerability Scanning
  # ──────────────────────────────────────────────────
  dependencies:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # pnpm audit — native npm advisory database check
      - name: pnpm audit
        run: pnpm audit --prod --audit-level=moderate
        continue-on-error: true # Advisory mode — flip to false to block on CRITICAL

      # Trivy — broader vulnerability database + license scanning
      # trivy-action@0.35.0 internally uses actions/cache@v4 (Node 20).
      # No newer version available yet. Monitor:
      # https://github.com/aquasecurity/trivy-action/releases
      - name: Trivy vulnerability scan (fs mode)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-deps.sarif
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore
          skip-dirs: packages/aurora-backoffice-client,packages/aurora-portal-client,contracts/lib,.sst,node_modules
        continue-on-error: true

      - name: Upload Trivy dependency results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-deps-results
          path: trivy-deps.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && vars.ENABLE_GHAS == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-dependencies

  # ──────────────────────────────────────────────────
  # Job 4: Secret Scanning (Gitleaks)
  # ──────────────────────────────────────────────────
  secrets:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Full history for git log scanning

      # gitleaks-action v2 still uses Node 20; no v3 yet. Monitor:
      # https://github.com/gitleaks/gitleaks-action/releases
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
        # Blocking — custom rules in .gitleaks.toml are high-confidence

  # ──────────────────────────────────────────────────
  # Job 5: IaC Scanning (Trivy config mode)
  # ──────────────────────────────────────────────────
  iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # trivy-action@0.35.0 internally uses actions/cache@v4 (Node 20).
      # No newer version available yet. Monitor:
      # https://github.com/aquasecurity/trivy-action/releases
      - name: Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH,MEDIUM
          skip-dirs: contracts/lib,.sst,node_modules
        continue-on-error: true

      - name: Upload Trivy IaC results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-iac-results
          path: trivy-iac.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && vars.ENABLE_GHAS == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # ──────────────────────────────────────────────────
  # Job 6: License Compliance
  # ──────────────────────────────────────────────────
  licenses:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # trivy-action@0.35.0 internally uses actions/cache@v4 (Node 20).
      # No newer version available yet. Monitor:
      # https://github.com/aquasecurity/trivy-action/releases
      - name: Trivy license scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          scanners: license
          severity: CRITICAL,HIGH
          skip-dirs: packages/aurora-backoffice-client,packages/aurora-portal-client,contracts/lib,.sst,node_modules
        continue-on-error: true # Advisory — review output before blocking

  # ──────────────────────────────────────────────────
  # Job 7: PR Dependency Review
  # ──────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  # ──────────────────────────────────────────────────
  # Job 8: SBOM Generation (CycloneDX)
  # ──────────────────────────────────────────────────
  sbom:
    name: SBOM Generation
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json
          artifact-name: sbom-cyclonedx.json

  # ──────────────────────────────────────────────────
  # Job 9: OpenSSF Scorecard
  # ──────────────────────────────────────────────────
  scorecard:
    name: OpenSSF Scorecard
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
        continue-on-error: true # Advisory — informational baseline

      - name: Upload Scorecard results
        if: always() && hashFiles('scorecard-results.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always() && vars.ENABLE_GHAS == 'true' && hashFiles('scorecard-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
          category: openssf-scorecard
